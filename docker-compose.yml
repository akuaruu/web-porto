version: '3.8'

services:
  # 1. Database PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: porto_db_container
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: porto_db

  # 2. Backend golang
  backend:
    build:
      context: ./backend
    container_name: porto_backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=porto_db
      - DB_HOST=db
      - JWT_SECRET=${JWT_SECRET}
      - PORT=8080
    depends_on:
      - db

  # 3. Frontend Next.js
  frontend:
    build:
      context: ./frontend
    container_name: porto_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
