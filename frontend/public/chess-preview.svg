<svg xmlns="http://www.w3.org/2000/svg" width="960" height="960" viewBox="0 0 960 960" role="img" aria-labelledby="title desc">
  <title id="title">Chess engine board preview</title>
  <desc id="desc">A static chess board preview with black pieces on the top ranks and white pieces on the bottom ranks.</desc>
  <defs>
    <style>
      .light { fill: #94b49f; }
      .dark { fill: #2d4a35; }
      .label { fill: #213b2a; font: 22px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; opacity: 0.88; }
      .white-piece { fill: #f8f8f8; stroke: #050505; stroke-width: 6px; paint-order: stroke; font: 94px "DejaVu Sans", "Noto Sans Symbols 2", "Segoe UI Symbol", serif; }
      .black-piece { fill: #020403; stroke: #020403; stroke-width: 3px; paint-order: stroke; font: 94px "DejaVu Sans", "Noto Sans Symbols 2", "Segoe UI Symbol", serif; }
    </style>
    <clipPath id="board-radius">
      <rect x="0" y="0" width="960" height="960" rx="14" ry="14" />
    </clipPath>
  </defs>
